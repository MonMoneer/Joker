<div class="relative w-full max-w-4xl grid grid-cols-4 gap-8 rotate-1">
<div class="h-64 w-44 bg-primary-container rounded-xl shadow-2xl border-4 border-secondary/30 flex items-center justify-center transform -rotate-6">

</button>

<div class="w-full max-w-md glass-panel rounded-full p-1 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.6)] animate-in fade-in zoom-in duration-500">
<div class="bg-surface-container-lowest rounded-full p-8 relative overflow-hidden border border-outline-variant/10">

<div class="absolute top-0 left-0 w-full h-1.5 gold-shimmer opacity-80"></div>
<div class="text-center mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-primary mb-2">Pick your order:</h2>
<p class="font-body text-on-surface-variant/70 text-sm font-semibold tracking-wide uppercase">Select your bid for this round</p>
</div>
<!-- Bidding Grid -->
<div class="grid grid-cols-3 gap-4 mb-8">
<!-- Numbers 1-5 -->
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">1</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">2</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">3</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">4</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">5</button>
<!-- Restricted Bid: 6 -->
<div class="relative h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container-highest text-outline opacity-50 cursor-not-allowed border border-dashed border-outline-variant">
                        6
                        <div class="absolute -top-1 -right-1">
<span class="material-symbols-outlined text-sm bg-error text-white rounded-full p-0.5" style="font-variation-settings: 'FILL' 1;">block</span>
</div>
</div>
<!-- Numbers 7-9 -->
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">7</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">8</button>
<button class="h-16 rounded-xl flex items-center justify-center font-headline text-2xl font-black bg-surface-container text-primary hover:bg-primary-container hover:text-white transition-all active:scale-95 border border-outline-variant/20 shadow-sm">9</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        0 - PASS
                    </button>
</div>
<!-- Info Message -->
<div class="mt-8 p-4 bg-surface-container-low rounded-xl flex items-start gap-3">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-xs font-medium text-on-surface-variant leading-relaxed">
                        Bid '6' is currently restricted because the total sum of bids must not equal the number of cards in play.
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (The Blueprint) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#001430]/80 backdrop-blur-xl dark:bg-[#001430]/95 no-border shadow-[0_-4px_20px_rgba(0,0,0,0.4)] rounded-t-3xl">
